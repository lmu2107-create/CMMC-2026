<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Coney Island F1 Circuit — Spike Ball Analysis</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #00ff88; --blue: #4488ff;
    --bg: #050810; --surface: #0d1220; --border: #1e2a40;
    --text: #c8d8f0; --muted: #4a5a78;
  }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; padding: 32px 16px;
  }
  header { text-align: center; margin-bottom: 36px; }
  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(28px, 5vw, 52px);
    letter-spacing: 4px; color: #fff; line-height: 1;
  }
  header p { font-size: 11px; color: var(--muted); letter-spacing: 2px; margin-top: 6px; text-transform: uppercase; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; max-width: 960px; }
  .panel {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .panel-title {
    font-family: 'Bebas Neue', sans-serif; font-size: 20px;
    letter-spacing: 3px; display: flex; align-items: center; gap: 10px;
  }
  .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  canvas.sphere { width: 100%; border-radius: 8px; background: #020508; display: block; }
  .factors { display: flex; flex-direction: column; gap: 6px; }
  .factor-row {
    display: flex; align-items: center; gap: 8px;
    cursor: pointer; padding: 4px 6px; border-radius: 6px; transition: background 0.15s;
  }
  .factor-row:hover { background: #131c2e; }
  .factor-row.dimmed { opacity: 0.25; }
  .fcolor { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .fname { font-size: 10px; flex: 1; color: var(--text); }
  .fraw { font-size: 9px; color: var(--muted); }
  .fbar-bg { width: 70px; height: 4px; background: #1a2438; border-radius: 3px; flex-shrink: 0; }
  .fbar { height: 100%; border-radius: 3px; }
  .fscore { font-size: 10px; color: var(--muted); min-width: 26px; text-align: right; }
  .section-label {
    font-size: 9px; letter-spacing: 2px; color: var(--muted);
    text-transform: uppercase; padding: 4px 6px 2px;
    border-bottom: 1px solid var(--border); margin-top: 4px;
  }
  .note { font-size: 10px; color: var(--muted); text-align: center; letter-spacing: 1px; padding-top: 4px; border-top: 1px solid var(--border); }
  @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<header>
  <h1>Coney Island Grand Prix</h1>
  <p>CMMC 2026 · Circuit Safety Analysis · Spike Ball Model</p>
</header>

<div class="grid">
  <div class="panel">
    <div class="panel-title"><span class="dot" style="background:var(--green)"></span>Driver Safety</div>
    <canvas id="c1" class="sphere"></canvas>
    <div class="factors" id="legend1"></div>
    <div class="note">click a factor to highlight · drag to rotate</div>
  </div>
  <div class="panel">
    <div class="panel-title"><span class="dot" style="background:var(--blue)"></span>Viewer Safety</div>
    <canvas id="c2" class="sphere"></canvas>
    <div class="factors" id="legend2"></div>
    <div class="note">click a factor to highlight · drag to rotate</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>

// ══════════════════════════════════════════════════════════════════════════════
// DRIVER SAFETY CSV
// Normalization:
//   curve_radius_score = (100 - r_m) / (100 - 5)      best=100m, worst=5m
//   width_score        = (w_m - 36) / (18 - 36)        best=36m,  worst=18m
//   straight_score     = (1000 - len_m) / (1000 - 100) best=1000m, worst=100m
//   subway_score       = (sub_m - 500) / (0 - 500)     best=500m, worst=0m
//   circuit_score      = |total_km - 5| / 1             best=5km, worst=4 or 6km
// ══════════════════════════════════════════════════════════════════════════════
const DRIVER_CSV = `Name,width (ft),length (mi),curve radius (m),Subway Closest Station (mi)
Neptune Ave,120,1.3,60,0.48
Ocean Parkway,210,0.3,90,0.1
Sea Breeze Ave,80,0.2,45,0.18
West 5 Street,80,0.082,25,0.22
Surf Ave,120,0.9,70,0.12
West 24 Street,60,0.3,30,0.55`;

// ══════════════════════════════════════════════════════════════════════════════
// VIEWER SAFETY CSV
// Normalization:
//   landmark_prox_score = dist_m / 500               best=0m,   worst=500m
//   sightline_score     = (80 - pct) / 70            best=80%,  worst=10%
//   transit_score       = (10 - lines) / 9           best=10,   worst=1
//   closure_score       = manual 0–1 estimate
//   subway_prox_score   = same formula as driver subway
// ══════════════════════════════════════════════════════════════════════════════
const VIEWER_CSV = `street,landmark_prox_score,sightline_score,transit_score,closure_score,subway_prox_score
Neptune Ave,0.73,0.50,0.33,0.20,0.48
Ocean Parkway,0.40,0.14,0.33,0.10,0.1
Sea Breeze Ave,0.10,0.29,0.33,0.10,0.18
West 5 Street,0.05,0.50,0.33,0.10,0.22
Surf Ave,0.02,0.07,0.33,0.30,0.12
West 24 Street,0.80,0.64,0.33,0.10,0.55`;

// ── CSV PARSER ────────────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split('\n').map(l => l.trim());
  const headers = lines[0].split(',').map(h => h.trim());
  return lines.slice(1).map(line => {
    const vals = line.split(',').map(v => v.trim());
    const obj = {};
    headers.forEach((h, i) => obj[h] = vals[i]);
    return obj;
  });
}

function clamp(v) { return Math.min(1, Math.max(0, v)); }

// ── BUILD DRIVER FACTORS FROM CSV ────────────────────────────────────────────
function buildDriverFactors(csv) {
  const rows = parseCSV(csv);
  const factors = [];

  const sections = [
    {
      section: "Curve radius",
      fn: row => {
        const r = parseFloat(row['curve radius (m)']);
        return { score: clamp((100 - r) / (100 - 5)), raw: `${r} m` };
      }
    },
    {
      section: "Road width",
      fn: row => {
        const ft = parseFloat(row['width (ft)']);
        // Ocean Pkwy: racing surface only = 70ft, not full 210ft
        const racing_ft = row['Name'].trim() === 'Ocean Parkway' ? 70 : ft;
        const m = racing_ft * 0.3048;
        return { score: clamp((m - 36) / (18 - 36)), raw: `${racing_ft} ft / ${m.toFixed(1)} m` };
      }
    },
    {
      section: "Straight length",
      fn: row => {
        const mi = parseFloat(row['length (mi)']);
        const m = mi * 1609.34;
        return { score: clamp((1000 - m) / (1000 - 100)), raw: `${mi} mi / ${Math.round(m)} m` };
      }
    },
    {
      section: "Subway proximity",
      fn: row => {
        const mi = parseFloat(row['Subway Closest Station (mi)']);
        const m = mi * 1609.34;
        return { score: clamp((m - 500) / (0 - 500)), raw: `${mi} mi / ${Math.round(m)} m` };
      }
    },
  ];

  sections.forEach(({ section, fn }) => {
    rows.forEach(row => {
      const { score, raw } = fn(row);
      factors.push({ section, label: row['Name'].trim(), score, raw });
    });
  });

  // Circuit length — single value, not per street
  const totalKm = rows.reduce((s, r) => s + parseFloat(r['length (mi)']) * 1.60934, 0);
  factors.push({
    section: "Circuit length",
    label: "Full circuit",
    score: clamp(Math.abs(totalKm - 5) / 1),
    raw: `${totalKm.toFixed(2)} km`
  });

  return factors;
}

// ── BUILD VIEWER FACTORS FROM CSV ─────────────────────────────────────────────
const VIEWER_COL_META = {
  landmark_prox_score: "Landmark proximity",
  sightline_score:     "Sightline visibility",
  transit_score:       "Crowd transit access",
  closure_score:       "Road closure impact",
  subway_prox_score:   "Subway proximity",
};

function buildViewerFactors(csv) {
  const rows = parseCSV(csv);
  const factors = [];
  Object.entries(VIEWER_COL_META).forEach(([col, section]) => {
    rows.forEach(row => {
      const score = parseFloat(row[col]);
      if (!isNaN(score)) {
        factors.push({ section, label: row['street'], raw: score.toFixed(2), score: clamp(score) });
      }
    });
  });
  return factors;
}

const DRIVER = buildDriverFactors(DRIVER_CSV);
const VIEWER = buildViewerFactors(VIEWER_CSV);

// ── COLOR ─────────────────────────────────────────────────────────────────────
function sc3(s) {
  if (s < 0.4) return new THREE.Color(0x00ff88);
  if (s < 0.7) return new THREE.Color(0xffaa22);
  return new THREE.Color(0xff3344);
}
function hc(s) {
  if (s < 0.4) return '#00ff88';
  if (s < 0.7) return '#ffaa22';
  return '#ff3344';
}

// ── FIBONACCI SPHERE ──────────────────────────────────────────────────────────
function fibSphere(n) {
  const pts = [], g = Math.PI * (3 - Math.sqrt(5));
  for (let i = 0; i < n; i++) {
    const y = 1 - (i / Math.max(n - 1, 1)) * 2;
    const r = Math.sqrt(1 - y * y), t = g * i;
    pts.push(new THREE.Vector3(r * Math.cos(t), y, r * Math.sin(t)).normalize());
  }
  return pts;
}

// ── BUILD SCENE ───────────────────────────────────────────────────────────────
function buildScene(canvasId, factors, accentHex) {
  const canvas = document.getElementById(canvasId);
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(42, 1, 0.1, 100);
  camera.position.set(0, 0, 5);
  scene.add(new THREE.AmbientLight(0x102030, 2));
  const d1 = new THREE.DirectionalLight(0xffffff, 3); d1.position.set(4, 6, 5); scene.add(d1);
  const d2 = new THREE.DirectionalLight(new THREE.Color(accentHex), 2); d2.position.set(-3, -2, 2); scene.add(d2);
  const group = new THREE.Group(); scene.add(group);
  group.add(new THREE.Mesh(new THREE.SphereGeometry(1, 80, 50),
    new THREE.MeshPhongMaterial({ color: 0x0a1520, specular: 0x112233, shininess: 60, transparent: true, opacity: 0.9 })));

  const dirs = fibSphere(factors.length);
  const spikeMats = [];
  const up = new THREE.Vector3(0, 1, 0);
  factors.forEach((f, i) => {
    const h = 0.08 + f.score * 1.4;
    const geo = new THREE.ConeGeometry(0.045, h, 12);
    geo.translate(0, h / 2, 0);
    const mat = new THREE.MeshPhongMaterial({ color: sc3(f.score), specular: 0xffffff, shininess: 100 });
    const cone = new THREE.Mesh(geo, mat);
    cone.quaternion.setFromUnitVectors(up, dirs[i]);
    cone.position.copy(dirs[i].clone().multiplyScalar(1.0));
    group.add(cone);
    spikeMats.push({ mat, score: f.score });
  });

  let drag = false, lx = 0, ly = 0, rx = 0.3, ry = 0.5;
  canvas.addEventListener('mousedown', e => { drag = true; lx = e.clientX; ly = e.clientY; });
  addEventListener('mouseup', () => drag = false);
  addEventListener('mousemove', e => {
    if (!drag) return;
    ry += (e.clientX - lx) * 0.013; rx += (e.clientY - ly) * 0.013;
    lx = e.clientX; ly = e.clientY;
  });
  function resize() {
    const w = canvas.parentElement.clientWidth - 32;
    renderer.setSize(w, w * 0.75, false);
    camera.aspect = w / (w * 0.75); camera.updateProjectionMatrix();
  }
  addEventListener('resize', resize); resize();
  (function animate() {
    requestAnimationFrame(animate);
    if (!drag) ry += 0.004;
    group.rotation.x = rx; group.rotation.y = ry;
    renderer.render(scene, camera);
  })();

  return idx => {
    spikeMats.forEach(({ mat, score }, i) => {
      if (idx === null) { mat.emissive.set(0x000000); mat.color.set(sc3(score)); }
      else if (i === idx) { mat.emissive.set(sc3(score)); mat.emissiveIntensity = 0.6; }
      else { mat.emissive.set(0x000000); mat.color.set(0x1a2438); }
    });
  };
}

// ── LEGEND ────────────────────────────────────────────────────────────────────
function buildLegend(id, factors, highlightFn) {
  const el = document.getElementById(id);
  el.innerHTML = '';
  let lastSection = null;
  factors.forEach((f, i) => {
    if (f.section !== lastSection) {
      const sep = document.createElement('div');
      sep.className = 'section-label';
      sep.textContent = f.section;
      el.appendChild(sep);
      lastSection = f.section;
    }
    const row = document.createElement('div');
    row.className = 'factor-row';
    row.innerHTML = `
      <span class="fcolor" style="background:${hc(f.score)}"></span>
      <span class="fname">${f.label} <span class="fraw">${f.raw}</span></span>
      <div class="fbar-bg"><div class="fbar" style="width:${f.score*100}%;background:${hc(f.score)}"></div></div>
      <span class="fscore">${Math.round(f.score * 100)}</span>`;
    let on = false;
    row.addEventListener('click', () => {
      on = !on;
      el.querySelectorAll('.factor-row').forEach((r, j) => r.classList.toggle('dimmed', on && j !== i));
      highlightFn(on ? i : null);
    });
    el.appendChild(row);
  });
}

// ── INIT ──────────────────────────────────────════════════════════════════════
buildLegend('legend1', DRIVER, buildScene('c1', DRIVER, '#00ff88'));
buildLegend('legend2', VIEWER, buildScene('c2', VIEWER, '#4488ff'));
</script>
</body>
</html>
